name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Build & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target
      - name: Cargo check
        working-directory: engine
        run: cargo check --all-targets
      - name: Cargo clippy
        working-directory: engine
        run: cargo clippy -- -W warnings 2>&1 || true
      - name: Start test database
        run: docker compose up -d --build postgres
      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U covalence && break
            sleep 2
          done
      - name: Apply migrations
        run: |
          for f in sql/[0-9]*.sql; do
            docker compose exec -T postgres psql -U covalence -d covalence -f /dev/stdin < "$f"
          done
      - name: Create test database
        run: |
          docker compose exec -T postgres createdb -U covalence covalence_test
      - name: Cargo test
        working-directory: engine
        env:
          DATABASE_URL: postgresql://covalence:covalence@localhost:5434/covalence_test
        run: cargo test -- --test-threads=1
      - name: Cleanup
        if: always()
        run: docker compose down -v

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        working-directory: engine
        run: cargo fmt -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        working-directory: engine
        run: cargo audit

  # openapi-client job will be added when covalence#57 is implemented
  # (auto-generate Python client from OpenAPI spec)
