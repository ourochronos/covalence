name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Build & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target
      - name: Cargo check
        working-directory: engine
        run: cargo check --all-targets
      - name: Cargo clippy
        working-directory: engine
        run: cargo clippy -- -W warnings 2>&1 || true
      - name: Start test database
        run: docker compose up -d --build postgres
      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U covalence && break
            sleep 2
          done
      - name: Apply migrations
        run: |
          for f in sql/[0-9]*.sql; do
            docker compose exec -T postgres psql -U covalence -d covalence -f /dev/stdin < "$f"
          done
      - name: Create test database
        run: |
          docker compose exec -T postgres createdb -U covalence covalence_test
      - name: Cargo test
        working-directory: engine
        env:
          DATABASE_URL: postgresql://covalence:covalence@localhost:5434/covalence_test
        run: cargo test -- --test-threads=1
      - name: Cleanup
        if: always()
        run: docker compose down -v

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        working-directory: engine
        run: cargo fmt -- --check

  openapi-client:
    name: OpenAPI Client (covalence#57)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Start the engine so we can export a fresh spec
      - name: Start engine
        run: |
          cp .env.example .env 2>/dev/null || true
          docker compose up -d --build
          # Wait for engine to be healthy
          for i in $(seq 1 30); do
            curl -sf http://localhost:8430/health && break
            sleep 3
          done

      # 2. Export the spec and verify it's valid JSON
      - name: Export OpenAPI spec
        run: |
          curl -fsSL http://localhost:8430/openapi.json \
            | python3 -m json.tool --indent 2 \
            > openapi.json
          echo "Spec size: $(wc -c < openapi.json | tr -d ' ') bytes"

      # 3. Regenerate the client (Docker, no Java needed)
      - name: Regenerate Python client
        run: ./scripts/generate-client.sh

      # 4. Fail if the committed client differs from freshly generated one
      #    (allows generator-comment churn; compares only tracked .py files)
      - name: Check client is up to date
        run: |
          # Ignore .openapi-generator metadata dirs and non-Python files
          diff_out=$(git diff --name-only -- 'clients/python/**/*.py' 2>&1 || true)
          if [[ -n "$diff_out" ]]; then
            echo "✗ Generated client differs from committed client!" >&2
            echo "$diff_out" >&2
            echo "" >&2
            echo "Regenerate locally with:" >&2
            echo "  make client-fetch" >&2
            echo "  git add clients/python openapi.json && git commit" >&2
            exit 1
          fi
          echo "✓ Client is up to date."

      - name: Cleanup
        if: always()
        run: docker compose down -v
