services:
  dev-pg:
    image: pgvector/pgvector:pg17
    container_name: covalence-dev-pg
    environment:
      POSTGRES_USER: covalence
      POSTGRES_PASSWORD: covalence
      POSTGRES_DB: covalence_dev
    ports:
      - "5435:5432"
    volumes:
      - covalence-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covalence -d covalence_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-pg:
    image: pgvector/pgvector:pg17
    container_name: covalence-test-pg
    environment:
      POSTGRES_USER: covalence
      POSTGRES_PASSWORD: covalence
      POSTGRES_DB: covalence_test
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covalence -d covalence_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - test

volumes:
  covalence-dev-data:
