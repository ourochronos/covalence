services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 17 — pgvector + Apache AGE extensions baked in
  #
  # • Always starts with `docker compose up -d` (or `scripts/dev-up.sh`)
  # • Credentials are read from .env (see .env.example).  Defaults work
  #   out-of-the-box for local development.
  # • Data is persisted in the `covalence-data` named volume.
  # • Exposed on **127.0.0.1:5434** only — not reachable from the network.
  # • Healthcheck: pg_isready polls every 5 s; 10 retries before unhealthy.
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: covalence-pg
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-covalence}
      POSTGRES_USER: ${POSTGRES_USER:-covalence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-covalence}
    env_file:
      - path: .env
        required: false
    volumes:
      - covalence-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-covalence}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Covalence Engine — Rust HTTP API  (profile: full)
  #
  # This service is OPTIONAL for local development.  In the standard dev
  # workflow the engine is compiled natively and managed by the macOS
  # LaunchAgent `ai.ourochronos.covalence-engine` (see DEPLOY.md).
  # The LaunchAgent auto-deploys on every commit via the post-commit hook.
  #
  # To run the full containerised stack instead:
  #   docker compose --profile full up -d
  #
  # To run only the database (for native engine dev — the common case):
  #   docker compose up -d postgres
  #   # or simply:
  #   scripts/dev-up.sh
  # ---------------------------------------------------------------------------
  engine:
    profiles: [full]
    build:
      context: .
      dockerfile: docker/engine.Dockerfile
    container_name: covalence-engine
    ports:
      - "127.0.0.1:8430:8430"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://covalence:covalence@postgres:5432/covalence}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-covalence}
      DB_USER: ${POSTGRES_USER:-covalence}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-covalence}
      BIND_ADDR: "0.0.0.0:8430"
      RUST_LOG: "covalence_engine=info,tower_http=info"
      # Optional: uncomment to require API key auth (all endpoints except /health)
      # COVALENCE_API_KEY: ${COVALENCE_API_KEY:-}
    env_file:
      - path: .env
        required: false
    volumes:
      - ./sql:/app/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8430/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

volumes:
  # ---------------------------------------------------------------------------
  # covalence-data — persistent PostgreSQL data directory.
  # Survives `docker compose down`; destroyed only by `docker compose down -v`.
  # ---------------------------------------------------------------------------
  covalence-data:
