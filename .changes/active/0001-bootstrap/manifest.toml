# Manifest for change 0001-bootstrap
#
# Authored manually — claude-ultra's brownfield `change init` tooling is upstream
# change 0015 (not yet built). The manifest format follows the reference at
# claude-ultra/.changes/archive/0001-bootstrap/manifest.toml.
#
# 12 modules × 11 concerns = 132 cells. The bootstrap installs framework
# apparatus only — no engine code is modified. Most cells are `n/a`; a small
# set of cells in `documentation` and per-module `documentation` cells are
# `complete` because the bootstrap delivers the holistic spec stubs and ADR.

[change]
id = "0001-bootstrap"
title = "Adopt claude-ultra change-management framework in Covalence"
spec = "spec.md"
amends_sections = [
    "overview.md",
    "invariants.md",
    "modules/*",
    "concerns/*",
]
phase = "implementation"
kind = "meta"
created = "2026-05-05T18:00:00Z"
updated = "2026-05-05T18:00:00Z"
depends_on_change = []

